<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #ffdde1, #ee9ca7);
      overflow-x: hidden;
      text-align: center;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 3rem;
      color: white;
      margin-top: 20px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 20px;
      margin: 15px auto;
      max-width: 90%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 1.5s ease;
    }

    p {
      font-size: 1.1rem;
      color: #444;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      position: relative;
      height: 80px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    #yesBtn {
      background: linear-gradient(45deg, #ff4b5c, #ff6b81);
      color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    #yesBtn:active {
      transform: scale(1.1);
    }

    #noBtn {
      background: white;
      color: #ff4b5c;
      border: 2px solid #ff4b5c;
      position: absolute;
    }

    #hidden {
      display: none;
      margin-top: 20px;
      font-size: 1.4rem;
      color: white;
      animation: fadeIn 1.5s ease;
    }

    /* 🌹 Floating Roses */
    .rose {
      position: fixed;
      top: -50px;
      font-size: 22px;
      animation: fall linear infinite;
      z-index: 0;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

  <h1>For You ❤️</h1>

  <div class="container">

    <div class="card">
      <p>I know I hurt you, and I’m really sorry... 💔</p>
    </div>

    <div class="card">
      <p>You mean everything to me, and I hate seeing you upset because of me.</p>
    </div>

    <div class="card">
      <p>I promise I’ll do better and be the person you deserve ❤️</p>
    </div>

    <div class="card">
      <p style="font-weight:600; font-size:1.2rem;">
        Will you forgive me? 🥺
      </p>

      <div class="buttons">
        <button id="yesBtn" onclick="sayYes()">Yes ❤️</button>
        <button id="noBtn" ontouchstart="moveNo()" onclick="moveNo()">No 😢</button>
      </div>
    </div>

    <p id="hidden">
      I knew you would say yes 😭❤️ I love you so much 🌹💖
    </p>

  </div>

  <script>
    function sayYes() {
      document.getElementById('hidden').style.display = 'block';
    }

    function moveNo() {
      const btn = document.getElementById('noBtn');
      const parent = btn.parentElement;

      const maxX = parent.clientWidth - btn.offsetWidth;
      const maxY = parent.clientHeight - btn.offsetHeight;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      btn.style.left = x + "px";
      btn.style.top = y + "px";
    }

    // 🌹 Create floating roses
    function createRose() {
      const rose = document.createElement("div");
      rose.classList.add("rose");
      rose.innerHTML = "🌹";
      rose.style.left = Math.random() * 100 + "vw";
      rose.style.animationDuration = (3 + Math.random() * 4) + "s";

      document.body.appendChild(rose);

      setTimeout(() => {
        rose.remove();
      }, 7000);
    }

    setInterval(createRose, 500);
  </script>

</body>
</html>
